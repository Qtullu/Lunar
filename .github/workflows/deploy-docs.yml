name: Deploy Doxygen Documentation

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Source/**"
      - "docs/Doxyfile"
      - "docs/mainpage.md"
      - "docs/groups.dox"
      - "docs/lunar-custom.css"
      - "docs/doxygen-awesome-css/**"
      - ".github/workflows/deploy-docs.yml"
      - "docs/assets/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Doxygen Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz wget tar

      - name: Install Doxygen 1.17.0
        run: |
          wget -O /tmp/doxygen-1.17.0.linux.bin.tar.gz https://sourceforge.net/projects/doxygen/files/rel-1.17.0/doxygen-1.17.0.linux.bin.tar.gz/download
          mkdir -p /tmp/doxygen-1.17.0
          tar -xzf /tmp/doxygen-1.17.0.linux.bin.tar.gz -C /tmp/doxygen-1.17.0 --strip-components=1
          echo "/tmp/doxygen-1.17.0/bin" >> $GITHUB_PATH

      - name: Print tool versions
        run: |
          doxygen --version
          dot -V

      - name: Verify Doxygen assets
        run: |
          test -f docs/doxygen-awesome-css/doxygen-awesome.css
          test -f docs/doxygen-awesome-css/doxygen-awesome-sidebar-only.css
          test -f docs/lunar-custom.css

      - name: Prepare Doxyfile for GitHub Actions
        run: |
          sed -i 's|^OUTPUT_DIRECTORY.*|OUTPUT_DIRECTORY       = docs/build|' docs/Doxyfile
          sed -i 's|^HTML_OUTPUT.*|HTML_OUTPUT            = html|' docs/Doxyfile
          sed -i 's|^XML_OUTPUT.*|XML_OUTPUT             = xml|' docs/Doxyfile
          sed -i 's|^DOT_PATH.*|DOT_PATH               =|' docs/Doxyfile
          sed -i "s|^STRIP_FROM_PATH.*|STRIP_FROM_PATH        = ${GITHUB_WORKSPACE}|" docs/Doxyfile
          sed -i "s|^STRIP_FROM_INC_PATH.*|STRIP_FROM_INC_PATH    = ${GITHUB_WORKSPACE}/Source|" docs/Doxyfile

      - name: Clean previous generated documentation
        run: |
          rm -rf docs/build
          rm -rf docs/html
          rm -rf docs/xml
          rm -rf docs/latex
          rm -f docs/doxygen-warnings.txt
          rm -f docs/doxygen-log.txt

      - name: Generate documentation
        run: doxygen docs/Doxyfile

      - name: Print generated index files
        run: |
          find docs -name index.html -print

      - name: Verify generated documentation
        run: |
          test -f docs/build/html/index.html
          test -f docs/build/html/doxygen-awesome.css
          test -f docs/build/html/doxygen-awesome-sidebar-only.css
          test -f docs/build/html/lunar-custom.css
          touch docs/build/html/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4